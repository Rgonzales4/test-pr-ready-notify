name: PR Ready Notify

# Note: issue_comment is the only GitHub event that fires for PR comments.
# There is no PR-only comment event. The job-level `if` below ensures this
# workflow is completely skipped for plain issue comments.
on:
  issue_comment:
    types: [created]

jobs:
  notify-slack:
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@pr-ready')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Verify this is a pull request
        run: |
          if [ -z "${{ github.event.issue.pull_request.url }}" ]; then
            echo "::notice::Not a pull request comment — skipping."
            exit 1
          fi

      - name: Check if already notified and get PR info
        id: pr-info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check for existing bot notification marker
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const alreadyNotified = comments.some(
              (c) =>
                c.user.type === 'Bot' &&
                c.body.includes('<!-- pr-ready-notified -->')
            );

            if (alreadyNotified) {
              core.setOutput('skip', 'true');
              return;
            }

            // Fetch PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            core.setOutput('skip', 'false');
            core.setOutput('is_draft', pr.draft ? 'true' : 'false');
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_author', pr.user.login);

            // Extract additional info: strip the @pr-ready line and trim blank lines
            const body = context.payload.comment.body;
            const additionalInfo = body
              .split('\n')
              .filter((line) => !line.trim().startsWith('@pr-ready'))
              .join('\n')
              .trim();

            core.setOutput('additional_info', additionalInfo);

      - name: Comment on draft PR
        if: |
          steps.pr-info.outputs.skip == 'false' &&
          steps.pr-info.outputs.is_draft == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `> [!WARNING]\n> Make sure PR is not in Draft before requesting a review.`,
            });

      - name: Notify Slack with pinned @mention mapping
        id: slack-notify
        if: |
          steps.pr-info.outputs.skip == 'false' &&
          steps.pr-info.outputs.is_draft == 'false'
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const slackToken = process.env.SLACK_BOT_TOKEN;
            const channelId = process.env.SLACK_CHANNEL_ID;

            // --- Resolve channel name from ID (do this first for the PR comment) ---
            let channelName = channelId;
            try {
              const infoRes = await fetch(
                `https://slack.com/api/conversations.info?channel=${encodeURIComponent(channelId)}`,
                { headers: { Authorization: `Bearer ${slackToken}` } }
              );
              const infoData = await infoRes.json();
              if (infoData.ok && infoData.channel && infoData.channel.name) {
                channelName = infoData.channel.name;
                core.info(`Resolved channel name: #${channelName}`);
              } else {
                core.warning(`conversations.info failed: ${infoData.error || 'missing channel name'}`);
              }
            } catch (e) {
              core.warning(`Failed to resolve channel name: ${e.message}`);
            }
            core.setOutput('channel_name', channelName);

            // --- Fetch pinned message mapping GitHub usernames → emails ---
            // Pinned message format (first line is the header):
            //   github-slack-user-map
            //   gh-username: email@example.com
            //   other-user: other@example.com
            let ghUsernameToEmail = {};
            try {
              const pinRes = await fetch(
                `https://slack.com/api/pins.list?channel=${channelId}`,
                { headers: { Authorization: `Bearer ${slackToken}` } }
              );

              const pinData = await pinRes.json();
              if (pinData.ok) {
                const mappingMsg = pinData.items.find(
                  (item) =>
                    item.message &&
                    item.message.text &&
                    item.message.text.includes('github-slack-user-map')
                );

                if (mappingMsg) {
                  const lines = mappingMsg.message.text
                    .split('\n')
                    .map(l => l.trim())
                    .filter(l => l && !l.toLowerCase().startsWith('github-slack-user-map'));

                  for (const line of lines) {
                    const separatorIdx = line.indexOf(':');
                    if (separatorIdx === -1) continue;
                    const ghUsername = line.slice(0, separatorIdx).trim().toLowerCase();
                    let email = line.slice(separatorIdx + 1).trim();
                    // Slack auto-formats emails as <mailto:user@example.com|user@example.com>
                    const mailtoMatch = email.match(/<mailto:[^|]+\|([^>]+)>/);
                    if (mailtoMatch) email = mailtoMatch[1];
                    if (ghUsername && email) {
                      ghUsernameToEmail[ghUsername] = email;
                    }
                  }
                  core.info(`Loaded ${Object.keys(ghUsernameToEmail).length} GitHub username → email mappings`);
                } else {
                  core.info('No github-slack-user-map pinned message found.');
                }
              } else {
                core.warning(`Failed to fetch pinned messages: ${pinData.error}`);
              }
            } catch (e) {
              core.warning(`Failed to load GitHub→Slack mapping: ${e.message}`);
            }

            // --- Helper: resolve GitHub username to Slack <@USER_ID> mention ---
            async function resolveToSlackMention(ghUsername) {
              // 1. Look up email from pinned message mapping (by GH username)
              const email = ghUsernameToEmail[ghUsername.toLowerCase()];
              if (!email) {
                core.info(`No email mapping found for GitHub user: ${ghUsername}`);
                return null;
              }

              // 2. Use Slack users.lookupByEmail to get the Slack user ID
              try {
                const lookupRes = await fetch(
                  `https://slack.com/api/users.lookupByEmail?email=${encodeURIComponent(email)}`,
                  { headers: { Authorization: `Bearer ${slackToken}` } }
                );
                const lookupData = await lookupRes.json();
                if (lookupData.ok && lookupData.user) {
                  core.info(`Resolved ${ghUsername} (${email}) → Slack user ${lookupData.user.id}`);
                  return `<@${lookupData.user.id}>`;
                } else {
                  core.warning(`Slack lookupByEmail failed for ${email}: ${lookupData.error}`);
                }
              } catch (e) {
                core.warning(`Failed to lookup Slack user by email ${email}: ${e.message}`);
              }
              return null;
            }

            // --- Resolve PR author & commenter to Slack mentions ---
            const prAuthorLogin = '${{ steps.pr-info.outputs.pr_author }}';
            const commenterLogin = context.payload.comment.user.login;

            const authorMention = await resolveToSlackMention(prAuthorLogin) || `@${prAuthorLogin}`;
            const commenterMention = await resolveToSlackMention(commenterLogin) || `@${commenterLogin}`;

            // --- Build Slack message ---
            const prUrl = '${{ steps.pr-info.outputs.pr_url }}';
            const prTitle = `${{ steps.pr-info.outputs.pr_title }}`;
            const additionalInfo = `${{ steps.pr-info.outputs.additional_info }}`;

            let text = `PR by ${authorMention} is ready for review: ${prUrl} (requested by ${commenterMention})`;
            const blocks = [
              {
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text: `*PR by ${authorMention} is ready for review:* <${prUrl}|${prTitle}>\n_Requested by ${commenterMention}_`
                }
              }
            ];

            if (additionalInfo) {
              blocks.push({
                type: 'section',
                text: { type: 'mrkdwn', text: additionalInfo }
              });
            }

            // --- Post to Slack via chat.postMessage ---
            const postRes = await fetch('https://slack.com/api/chat.postMessage', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${slackToken}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ channel: channelId, text, blocks }),
            });
            const postData = await postRes.json();

            if (!postData.ok) {
              core.setFailed(`Slack chat.postMessage failed: ${postData.error}`);
              return;
            }

            core.info(`Slack message posted: ts=${postData.ts}`);

            // --- Post threaded reply to auto-subscribe PR author ---
            if (authorMention.startsWith('<@')) {
              const threadRes = await fetch('https://slack.com/api/chat.postMessage', {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${slackToken}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  channel: channelId,
                  thread_ts: postData.ts,
                  text: `${authorMention} — you'll be notified of replies to this thread.`
                })
              });
              const threadData = await threadRes.json();
              if (!threadData.ok) {
                core.warning(`Threaded reply failed: ${threadData.error}`);
              } else {
                core.info('Threaded reply posted — author auto-subscribed.');
              }
            } else {
              core.info('Skipping threaded reply — author Slack user ID not resolved.');
            }

      - name: Mark PR as notified
        if: |
          steps.pr-info.outputs.skip == 'false' &&
          steps.pr-info.outputs.is_draft == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `<!-- pr-ready-notified -->\n:white_check_mark: Slack notification sent to *#${{ steps.slack-notify.outputs.channel_name }}*.`,
            });
