name: PR Ready Notify

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, ready_for_review, converted_to_draft, closed]
  pull_request_review:
    types: [submitted]

jobs:
  notify-slack:
    # issue_comment: only PR comments containing @pr-ready
    # pull_request / pull_request_review: always run
    if: >-
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@pr-ready')) ||
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: PR lifecycle Slack notification
        id: slack-notify
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const slackToken = process.env.SLACK_BOT_TOKEN;
            const channelId = process.env.SLACK_CHANNEL_ID;

            // ==========================================================
            // Slack API helper
            // ==========================================================
            async function slackApi(method, options = {}) {
              const { params, body } = options;
              const url = new URL(`https://slack.com/api/${method}`);
              if (params) {
                for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
              }
              const fetchOpts = { headers: { Authorization: `Bearer ${slackToken}` } };
              if (body) {
                fetchOpts.method = 'POST';
                fetchOpts.headers['Content-Type'] = 'application/json';
                fetchOpts.body = JSON.stringify(body);
              }
              const res = await fetch(url, fetchOpts);
              if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
              return res.json();
            }

            function escapeSlackText(str) {
              return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            // ==========================================================
            // Determine event type and PR info
            // ==========================================================
            const eventName = context.eventName;
            let pr, action;

            if (eventName === 'issue_comment') {
              const { data } = await github.rest.pulls.get({
                ...context.repo, pull_number: context.issue.number,
              });
              pr = data;
              action = 'pr-ready-comment';
            } else if (eventName === 'pull_request') {
              pr = context.payload.pull_request;
              const ghAction = context.payload.action;
              if (ghAction === 'opened' && !pr.draft) {
                action = 'opened';
              } else if (ghAction === 'ready_for_review') {
                action = 'ready-for-review';
              } else if (ghAction === 'converted_to_draft') {
                action = 'converted-to-draft';
              } else if (ghAction === 'closed' && pr.merged) {
                action = 'merged';
              } else if (ghAction === 'closed') {
                action = 'closed';
              } else {
                core.info(`Skipping PR event: action=${ghAction}, draft=${pr.draft}`);
                return;
              }
            } else if (eventName === 'pull_request_review') {
              pr = context.payload.pull_request;
              const review = context.payload.review;
              const reviewState = review.state.toLowerCase();
              core.info(`Review state: "${review.state}" (normalized: "${reviewState}")`);
              if (reviewState === 'approved') {
                action = 'review-approved';
              } else if (reviewState === 'changes_requested') {
                action = 'review-changes-requested';
              } else if (reviewState === 'commented') {
                action = 'review-commented';
              } else {
                core.info(`Skipping review event: state=${review.state}`);
                return;
              }
            }

            const prNumber = pr.number;
            const prUrl = pr.html_url;
            const prTitle = pr.title;
            const prAuthorLogin = pr.user.login;

            core.info(`Event: ${action}, PR #${prNumber}: ${prTitle}`);

            // ==========================================================
            // For @pr-ready comments: validate PR state and extract info
            // ==========================================================
            if (action === 'pr-ready-comment') {
              if (pr.merged) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: prNumber,
                  body: '> [!WARNING]\n> This PR has already been merged. No further review is needed.',
                });
                return;
              }
              if (pr.state === 'closed') {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: prNumber,
                  body: '> [!WARNING]\n> This PR is currently closed. PR review has not been requested.',
                });
                return;
              }
              if (pr.draft) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: prNumber,
                  body: '> [!WARNING]\n> This PR is currently marked as *Draft*.\n⚠️ Next steps: Convert the PR to ready-for-review status before requesting reviews.',
                });
                return;
              }
            }

            // ==========================================================
            // Fetch channel info and pinned user mappings
            // ==========================================================
            const [channelResult, pinsResult] = await Promise.allSettled([
              slackApi('conversations.info', { params: { channel: channelId } }),
              slackApi('pins.list', { params: { channel: channelId } }),
            ]);

            let channelName = channelId;
            if (channelResult.status === 'fulfilled' && channelResult.value.ok) {
              channelName = channelResult.value.channel?.name || channelId;
            }

            // Parse pinned message mapping (github-slack-user-map)
            const keyToSlackEmail = {};
            if (pinsResult.status === 'fulfilled' && pinsResult.value.ok) {
              const mappingMsg = pinsResult.value.items?.find(
                item => item.message?.text?.includes('github-slack-user-map')
              );
              if (mappingMsg) {
                const allLines = mappingMsg.message.text.split('\n');
                const markerIdx = allLines.findIndex(
                  l => l.trim().toLowerCase().startsWith('github-slack-user-map')
                );
                if (markerIdx !== -1) {
                  for (const raw of allLines.slice(markerIdx + 1)) {
                    const line = raw.trim();
                    if (!line || line.startsWith('#')) continue;
                    const sepIdx = line.indexOf(': ');
                    if (sepIdx === -1) continue;
                    const key = line.slice(0, sepIdx).trim().toLowerCase();
                    let slackEmail = line.slice(sepIdx + 2).trim();
                    const mailtoMatch = slackEmail.match(/<mailto:[^|]+\|([^>]+)>/);
                    if (mailtoMatch) slackEmail = mailtoMatch[1];
                    if (key && slackEmail) keyToSlackEmail[key] = slackEmail;
                  }
                }
                core.info(`Loaded ${Object.keys(keyToSlackEmail).length} pinned mappings`);
              }
            }

            // ==========================================================
            // User resolution helpers
            // ==========================================================
            const emailCache = new Map();

            async function slackMentionByEmail(email) {
              const lower = email.toLowerCase();
              if (emailCache.has(lower)) return emailCache.get(lower);
              let mention = null;
              try {
                const data = await slackApi('users.lookupByEmail', { params: { email } });
                if (data.ok && data.user) {
                  mention = `<@${data.user.id}>`;
                  core.info(`Slack: ${email} → ${data.user.id}`);
                }
              } catch (e) {
                core.warning(`lookupByEmail failed for ${email}: ${e.message}`);
              }
              emailCache.set(lower, mention);
              return mention;
            }

            async function resolveEmailToSlackMention(email) {
              const mention = await slackMentionByEmail(email);
              if (mention) return mention;
              const mapped = keyToSlackEmail[email.toLowerCase()];
              if (mapped && mapped.toLowerCase() !== email.toLowerCase()) {
                return await slackMentionByEmail(mapped);
              }
              return null;
            }

            let _prCommits = null;
            async function getPrCommits() {
              if (_prCommits !== null) return _prCommits;
              try {
                const { data } = await github.rest.pulls.listCommits({
                  ...context.repo, pull_number: prNumber,
                });
                _prCommits = data;
              } catch (e) {
                core.warning(`Failed to fetch PR commits: ${e.message}`);
                _prCommits = [];
              }
              return _prCommits;
            }

            async function resolveToSlackMention(ghUsername) {
              // 1. GitHub profile email
              try {
                const { data: ghUser } = await github.rest.users.getByUsername({ username: ghUsername });
                if (ghUser.email) {
                  const mention = await resolveEmailToSlackMention(ghUser.email);
                  if (mention) return mention;
                }
              } catch (e) {
                core.warning(`GitHub profile fetch failed for ${ghUsername}: ${e.message}`);
              }

              // 2. PR commit author email
              const commits = await getPrCommits();
              const authorCommit = commits.findLast(
                c => c.author?.login?.toLowerCase() === ghUsername.toLowerCase()
              );
              const commitEmail = authorCommit?.commit?.author?.email;
              if (commitEmail && !commitEmail.endsWith('@users.noreply.github.com')) {
                const mention = await resolveEmailToSlackMention(commitEmail);
                if (mention) return mention;
              }

              // 3. Pinned mapping by username
              const slackEmail = keyToSlackEmail[ghUsername.toLowerCase()];
              if (slackEmail) return await slackMentionByEmail(slackEmail);

              core.warning(`Could not resolve ${ghUsername} to Slack user`);
              return null;
            }

            // ==========================================================
            // Search Slack channel for existing message about this PR
            // ==========================================================
            let existingSlackTs = '';
            let existingBlocks = null;
            let existingText = '';

            try {
              let cursor;
              let found = false;
              for (let page = 0; page < 5 && !found; page++) {
                const params = { channel: channelId, limit: '100' };
                if (cursor) params.cursor = cursor;
                const history = await slackApi('conversations.history', { params });
                if (!history.ok) {
                  core.warning(`conversations.history failed: ${history.error}`);
                  break;
                }
                for (const msg of (history.messages || [])) {
                  let foundInText = false;

                  if (msg.text && msg.text.includes(prUrl)) foundInText = true;

                  function blocksContainUrl(blocks) {
                    if (!blocks) return false;
                    for (const b of blocks) {
                      if (typeof b === 'object') {
                        for (const key of Object.keys(b)) {
                          const val = b[key];
                          if (typeof val === 'string') {
                            const normalized = val.replace(/<([^>|]+)(\|[^>]+)?>/g, '$1');
                            if (normalized.includes(prUrl)) return true;
                          }
                          if (Array.isArray(val) && blocksContainUrl(val)) return true;
                          if (typeof val === 'object' && blocksContainUrl([val])) return true;
                        }
                      }
                    }
                    return false;
                  }

                  if (!foundInText && blocksContainUrl(msg.blocks)) foundInText = true;

                  if (foundInText) {
                    existingSlackTs = msg.ts;
                    existingBlocks = msg.blocks || [];
                    existingText = msg.text || '';
                    found = true;
                    core.info(`Found existing Slack message for PR: ts=${msg.ts}`);
                    break;
                  }
                }
                cursor = history.response_metadata?.next_cursor;
                if (!cursor) break;
              }
            } catch (e) {
              core.warning(`Slack channel history search failed: ${e.message}`);
            }

            // ==========================================================
            // Bot-managed status emoji on parent message — mutually exclusive.
            // Only one status at a time, shown as emoji prefix in the message text
            // AND as a reaction (if reactions:write scope is available).
            const ALL_STATUS_REACTIONS = ['bell', 'white_check_mark', 'repeat', 'speech_balloon', 'pencil2', 'tada', 'no_entry'];

            const STATUS_CONFIG = {
              'ready':                    { emoji: ':bell:',              label: '' },
              'converted-to-draft':       { emoji: ':pencil2:',          label: ' [Draft]' },
              'review-approved':          { emoji: ':white_check_mark:', label: '' },
              'review-commented':         { emoji: ':speech_balloon:',   label: '' },
              'review-changes-requested': { emoji: ':repeat:',           label: ' [Changes Requested]' },
              'merged':                   { emoji: ':tada:',             label: ' [Merged]' },
              'closed':                   { emoji: ':no_entry:',         label: ' [Closed]' },
            };

            // Map emoji shortcode (e.g. ':bell:') to reaction name (e.g. 'bell')
            function emojiToReaction(emoji) {
              return emoji.replace(/:/g, '');
            }

            // ==========================================================
            // Update parent message status (emoji in text + reaction)
            // ==========================================================
            async function updateParentMessage(ts, statusKey, authorMention) {
              const config = STATUS_CONFIG[statusKey];
              if (!config) {
                core.warning(`No STATUS_CONFIG for key: "${statusKey}"`);
                return;
              }

              const reactionName = emojiToReaction(config.emoji);
              core.info(`>>> updateParentMessage called: status="${statusKey}", emoji=${config.emoji}, reaction=${reactionName}, ts=${ts}`);

              // Update message text — emoji prefix is the primary status indicator
              const statusText = config.label
                ? `${config.emoji} *PR by ${authorMention}${config.label}:* ${prUrl}`
                : `${config.emoji} *PR by ${authorMention} is ready for review:* ${prUrl}`;
              const blocks = [
                {
                  type: 'section',
                  text: { type: 'mrkdwn', text: statusText },
                },
              ];

              const updateBody = { channel: channelId, ts, text: statusText, blocks };
              core.info(`>>> chat.update body: ${JSON.stringify({ channel: channelId, ts, text: statusText.substring(0, 80) })}`);

              try {
                const result = await slackApi('chat.update', { body: updateBody });
                core.info(`>>> chat.update response: ok=${result.ok}, error=${result.error || 'none'}, ts=${result.ts || 'none'}`);
              } catch (e) {
                core.warning(`>>> chat.update THREW: ${e.message}`);
              }

              // Manage reactions — add current, remove all others
              // (requires reactions:write scope on the Slack bot)
              const othersToRemove = ALL_STATUS_REACTIONS.filter(r => r !== reactionName);

              try {
                const addResult = await slackApi('reactions.add', {
                  body: { channel: channelId, timestamp: ts, name: reactionName },
                });
                core.info(`>>> reactions.add(${reactionName}): ok=${addResult.ok}, error=${addResult.error || 'none'}`);
              } catch (e) {
                core.warning(`>>> reactions.add(${reactionName}) THREW: ${e.message}`);
              }

              for (const name of othersToRemove) {
                try {
                  const rmResult = await slackApi('reactions.remove', {
                    body: { channel: channelId, timestamp: ts, name },
                  });
                  if (rmResult.ok) {
                    core.info(`>>> reactions.remove(${name}): removed`);
                  } else if (rmResult.error !== 'no_reaction') {
                    core.info(`>>> reactions.remove(${name}): ${rmResult.error}`);
                  }
                } catch (e) {
                  // Ignore
                }
              }
              core.info(`>>> updateParentMessage DONE for "${statusKey}"`);
            }

            // ==========================================================
            // Post a thread reply
            // ==========================================================
            async function postThreadReply(ts, text) {
              const result = await slackApi('chat.postMessage', {
                body: {
                  channel: channelId,
                  thread_ts: ts,
                  text,
                  blocks: [{ type: 'section', text: { type: 'mrkdwn', text } }],
                },
              });
              if (!result.ok) {
                core.warning(`Thread reply failed: ${result.error}`);
                return null;
              }
              core.info(`Thread reply posted: ts=${result.ts}`);
              return result.ts;
            }

            // ==========================================================
            // Create new parent message
            // ==========================================================
            async function createParentMessage(authorMention, additionalInfo) {
              const statusText = `*PR by ${authorMention} is ready for review:* ${prUrl}`;
              const text = `PR by ${authorMention} is ready for review: ${prUrl}`;
              const blocks = [
                {
                  type: 'section',
                  text: { type: 'mrkdwn', text: statusText },
                },
              ];
              if (additionalInfo) {
                blocks.push({
                  type: 'section',
                  text: { type: 'mrkdwn', text: additionalInfo },
                });
              }

              const postData = await slackApi('chat.postMessage', {
                body: { channel: channelId, text, blocks },
              });
              if (!postData.ok) {
                core.setFailed(`chat.postMessage failed: ${postData.error}`);
                return null;
              }
              core.info(`New Slack message posted: ts=${postData.ts}`);

              return postData.ts;
            }

            // ==========================================================
            // Main logic per event type
            // ==========================================================
            const authorMention = await resolveToSlackMention(prAuthorLogin) || `@${prAuthorLogin}`;

            // --- @pr-ready comment (thread-only: re-review notification) ---
            if (action === 'pr-ready-comment') {
              if (!existingSlackTs) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: prNumber,
                  body: '> [!NOTE]\n> No Slack thread exists for this PR yet. A thread is created automatically when the PR is opened (non-draft) or marked ready for review.',
                });
                return;
              }

              const commenterLogin = context.payload.comment.user.login;
              const isSameUser = prAuthorLogin.toLowerCase() === commenterLogin.toLowerCase();

              const additionalInfo = context.payload.comment.body
                .split('\n')
                .filter(l => !l.trim().toLowerCase().startsWith('@pr-ready'))
                .join('\n')
                .trim();

              // Collect PR reviewers from GitHub (requested + those who submitted reviews)
              const reviewerLogins = new Set();
              for (const r of (pr.requested_reviewers || [])) {
                if (r.login.toLowerCase() !== prAuthorLogin.toLowerCase()) {
                  reviewerLogins.add(r.login);
                }
              }
              try {
                const reviews = await github.paginate(github.rest.pulls.listReviews, {
                  ...context.repo, pull_number: prNumber, per_page: 100,
                });
                for (const r of reviews) {
                  if (r.user.login.toLowerCase() !== prAuthorLogin.toLowerCase()) {
                    reviewerLogins.add(r.user.login);
                  }
                }
              } catch (e) {
                core.warning(`Failed to fetch PR reviews: ${e.message}`);
              }

              // Resolve reviewer GitHub logins to Slack mentions
              const reviewerMentions = [];
              for (const login of reviewerLogins) {
                const mention = await resolveToSlackMention(login) || `@${login}`;
                reviewerMentions.push(mention);
              }

              let mainText = ':bell: PR is ready for re-review';
              if (!isSameUser) {
                const commenterMention = await resolveToSlackMention(commenterLogin) || `@${commenterLogin}`;
                mainText += ` (requested by ${commenterMention})`;
              }
              if (reviewerMentions.length > 0) mainText += `\ncc ${reviewerMentions.join(', ')}`;
              if (additionalInfo) mainText += `\n\n${additionalInfo}`;

              await postThreadReply(existingSlackTs, mainText);
              await updateParentMessage(existingSlackTs, 'ready', authorMention);
              core.setOutput('is_new', 'false');
              return;
            }

            // --- PR opened (non-draft) or marked ready for review ---
            if (action === 'opened' || action === 'ready-for-review') {
              if (existingSlackTs) {
                const verb = action === 'opened' ? 'opened and is' : 'is now';
                await postThreadReply(existingSlackTs, `PR ${verb} ready for review`);
                await updateParentMessage(existingSlackTs, 'ready', authorMention);
              } else {
                const ts = await createParentMessage(authorMention);
                if (!ts) return;

                // Subscribe author to thread
                if (authorMention.startsWith('<@')) {
                  try {
                    await slackApi('chat.postMessage', {
                      body: {
                        channel: channelId,
                        thread_ts: ts,
                        text: `${authorMention} — you'll be notified of replies to this thread.`,
                      },
                    });
                  } catch (e) {
                    core.warning(`Author subscription reply failed: ${e.message}`);
                  }
                }

                core.setOutput('is_new', 'true');
                core.setOutput('slack_ts', ts);
                core.setOutput('channel_name', channelName);
              }
              return;
            }

            // --- Converted to draft ---
            if (action === 'converted-to-draft') {
              if (!existingSlackTs) { core.info('No existing Slack thread — skipping draft notification'); return; }
              await postThreadReply(existingSlackTs, ':pencil2: PR has been converted back to draft');
              await updateParentMessage(existingSlackTs, 'converted-to-draft', authorMention);
              return;
            }

            // --- Review submitted ---
            if (action === 'review-approved' || action === 'review-changes-requested' || action === 'review-commented') {
              if (!existingSlackTs) { core.info('No existing Slack thread — skipping review notification'); return; }

              const reviewerLogin = context.payload.review.user.login;
              const reviewerMention = await resolveToSlackMention(reviewerLogin) || `@${reviewerLogin}`;

              if (action === 'review-approved') {
                await postThreadReply(existingSlackTs, `:white_check_mark: ${reviewerMention} reviewed this PR — *approved*`);
                await updateParentMessage(existingSlackTs, 'review-approved', authorMention);
              } else if (action === 'review-changes-requested') {
                await postThreadReply(existingSlackTs, `:repeat: ${reviewerMention} reviewed this PR — *requested changes*`);
                await updateParentMessage(existingSlackTs, 'review-changes-requested', authorMention);
              } else {
                await postThreadReply(existingSlackTs, `:speech_balloon: ${reviewerMention} reviewed this PR — *commented*`);
                await updateParentMessage(existingSlackTs, 'review-commented', authorMention);
              }
              return;
            }

            // --- Merged ---
            if (action === 'merged') {
              if (!existingSlackTs) { core.info('No existing Slack thread — skipping merge notification'); return; }
              await postThreadReply(existingSlackTs, ':tada: PR has been merged');
              await updateParentMessage(existingSlackTs, 'merged', authorMention);
              return;
            }

            // --- Closed (not merged) ---
            if (action === 'closed') {
              if (!existingSlackTs) { core.info('No existing Slack thread — skipping close notification'); return; }
              await postThreadReply(existingSlackTs, ':no_entry: PR has been closed');
              await updateParentMessage(existingSlackTs, 'closed', authorMention);
              return;
            }

      - name: Comment on PR with Slack reference
        if: steps.slack-notify.outputs.is_new == 'true'
        uses: actions/github-script@v7
        env:
          CHANNEL_NAME: ${{ steps.slack-notify.outputs.channel_name }}
          SLACK_TS: ${{ steps.slack-notify.outputs.slack_ts }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const channelName = process.env.CHANNEL_NAME;
            const slackTs = process.env.SLACK_TS;
            const prNumber = context.issue?.number || context.payload.pull_request?.number;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNumber,
              body: `<!-- slack-notify-ts:${slackTs} -->\n:white_check_mark: Slack notification sent to *#${channelName}*.`,
            });
