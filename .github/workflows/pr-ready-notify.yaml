name: PR Ready Notify

# issue_comment is the only GitHub event that fires for PR comments.
# The job-level `if` ensures this is skipped for plain issue comments.
on:
  issue_comment:
    types: [created]

jobs:
  notify-slack:
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@pr-ready')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Get PR info and check state
        id: pr-info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              ...context.repo, pull_number: issue_number,
            });

            if (pr.merged) { core.setOutput('status', 'merged'); return; }
            if (pr.state === 'closed') { core.setOutput('status', 'closed'); return; }
            if (pr.draft) { core.setOutput('status', 'draft'); return; }

            // Check if all reviews are approved with no pending reviewers
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              ...context.repo, pull_number: issue_number, per_page: 100,
            });
            const latestByReviewer = new Map();
            for (const r of reviews) {
              if (r.state !== 'COMMENTED') latestByReviewer.set(r.user.login, r.state);
            }
            const allApproved = latestByReviewer.size > 0
              && [...latestByReviewer.values()].every(s => s === 'APPROVED');
            const noPending = pr.requested_reviewers.length === 0
              && (pr.requested_teams?.length ?? 0) === 0;
            if (allApproved && noPending) {
              core.setOutput('status', 'approved');
              return;
            }

            core.setOutput('status', 'ready');
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_author', pr.user.login);

            // Strip @pr-ready line(s) case-insensitively
            const additionalInfo = context.payload.comment.body
              .split('\n')
              .filter(l => !l.trim().toLowerCase().startsWith('@pr-ready'))
              .join('\n')
              .trim();
            core.setOutput('additional_info', additionalInfo);

      - name: Comment on skipped PR
        if: >-
          steps.pr-info.outputs.status == 'merged' ||
          steps.pr-info.outputs.status == 'closed' ||
          steps.pr-info.outputs.status == 'draft' ||
          steps.pr-info.outputs.status == 'approved'
        uses: actions/github-script@v7
        env:
          PR_STATUS: ${{ steps.pr-info.outputs.status }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const messages = {
              merged: '> [!NOTE]\n> This PR is already merged.',
              closed: '> [!NOTE]\n> This PR is closed.',
              draft: '> [!WARNING]\n> Make sure PR is not in Draft before requesting a review.',
              approved: '> [!NOTE]\n> This PR already has all required approvals with no pending reviewers.',
            };
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: messages[process.env.PR_STATUS],
            });

      - name: Notify Slack
        id: slack-notify
        if: steps.pr-info.outputs.status == 'ready'
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PR_URL: ${{ steps.pr-info.outputs.pr_url }}
          PR_TITLE: ${{ steps.pr-info.outputs.pr_title }}
          PR_AUTHOR: ${{ steps.pr-info.outputs.pr_author }}
          ADDITIONAL_INFO: ${{ steps.pr-info.outputs.additional_info }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const slackToken = process.env.SLACK_BOT_TOKEN;
            const channelId = process.env.SLACK_CHANNEL_ID;

            // --- Slack API helper ---
            async function slackApi(method, options = {}) {
              const { params, body } = options;
              const url = new URL(`https://slack.com/api/${method}`);
              if (params) {
                for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
              }
              const fetchOpts = { headers: { Authorization: `Bearer ${slackToken}` } };
              if (body) {
                fetchOpts.method = 'POST';
                fetchOpts.headers['Content-Type'] = 'application/json';
                fetchOpts.body = JSON.stringify(body);
              }
              const res = await fetch(url, fetchOpts);
              if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
              return res.json();
            }

            function escapeSlackText(str) {
              return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            // --- Fetch channel name and pinned mappings in parallel ---
            const [channelResult, pinsResult] = await Promise.allSettled([
              slackApi('conversations.info', { params: { channel: channelId } }),
              slackApi('pins.list', { params: { channel: channelId } }),
            ]);

            let channelName = channelId;
            if (channelResult.status === 'fulfilled' && channelResult.value.ok) {
              channelName = channelResult.value.channel?.name || channelId;
            }
            core.setOutput('channel_name', channelName);

            // --- Parse pinned message mapping ---
            const keyToSlackEmail = {};
            if (pinsResult.status === 'fulfilled' && pinsResult.value.ok) {
              const mappingMsg = pinsResult.value.items?.find(
                item => item.message?.text?.includes('github-slack-user-map')
              );
              if (mappingMsg) {
                const allLines = mappingMsg.message.text.split('\n');
                const markerIdx = allLines.findIndex(
                  l => l.trim().toLowerCase().startsWith('github-slack-user-map')
                );
                if (markerIdx !== -1) {
                  for (const raw of allLines.slice(markerIdx + 1)) {
                    const line = raw.trim();
                    if (!line || line.startsWith('#')) continue;
                    const sepIdx = line.indexOf(': ');
                    if (sepIdx === -1) continue;
                    const key = line.slice(0, sepIdx).trim().toLowerCase();
                    let slackEmail = line.slice(sepIdx + 2).trim();
                    const mailtoMatch = slackEmail.match(/<mailto:[^|]+\|([^>]+)>/);
                    if (mailtoMatch) slackEmail = mailtoMatch[1];
                    if (key && slackEmail) keyToSlackEmail[key] = slackEmail;
                  }
                }
                core.info(`Loaded ${Object.keys(keyToSlackEmail).length} pinned mappings`);
              }
            }

            // --- User resolution helpers ---
            const emailCache = new Map();

            async function slackMentionByEmail(email) {
              const lower = email.toLowerCase();
              if (emailCache.has(lower)) return emailCache.get(lower);
              let mention = null;
              try {
                const data = await slackApi('users.lookupByEmail', { params: { email } });
                if (data.ok && data.user) {
                  mention = `<@${data.user.id}>`;
                  core.info(`Slack: ${email} → ${data.user.id}`);
                }
              } catch (e) {
                core.warning(`lookupByEmail failed for ${email}: ${e.message}`);
              }
              emailCache.set(lower, mention);
              return mention;
            }

            async function resolveEmailToSlackMention(email) {
              const mention = await slackMentionByEmail(email);
              if (mention) return mention;
              const mapped = keyToSlackEmail[email.toLowerCase()];
              if (mapped && mapped.toLowerCase() !== email.toLowerCase()) {
                return await slackMentionByEmail(mapped);
              }
              return null;
            }

            // Lazily fetched and cached
            let _prCommits = null;
            async function getPrCommits() {
              if (_prCommits !== null) return _prCommits;
              try {
                const { data } = await github.rest.pulls.listCommits({
                  ...context.repo, pull_number: context.issue.number,
                });
                _prCommits = data;
              } catch (e) {
                core.warning(`Failed to fetch PR commits: ${e.message}`);
                _prCommits = [];
              }
              return _prCommits;
            }

            async function resolveToSlackMention(ghUsername) {
              // 1. GitHub profile email
              try {
                const { data: ghUser } = await github.rest.users.getByUsername({ username: ghUsername });
                if (ghUser.email) {
                  const mention = await resolveEmailToSlackMention(ghUser.email);
                  if (mention) return mention;
                }
              } catch (e) {
                core.warning(`GitHub profile fetch failed for ${ghUsername}: ${e.message}`);
              }

              // 2. PR commit author email
              const commits = await getPrCommits();
              const authorCommit = commits.findLast(
                c => c.author?.login?.toLowerCase() === ghUsername.toLowerCase()
              );
              const commitEmail = authorCommit?.commit?.author?.email;
              if (commitEmail && !commitEmail.endsWith('@users.noreply.github.com')) {
                const mention = await resolveEmailToSlackMention(commitEmail);
                if (mention) return mention;
              }

              // 3. Pinned mapping by username
              const slackEmail = keyToSlackEmail[ghUsername.toLowerCase()];
              if (slackEmail) return await slackMentionByEmail(slackEmail);

              core.warning(`Could not resolve ${ghUsername} to Slack user`);
              return null;
            }

            // --- Shared state ---
            const prAuthorLogin = process.env.PR_AUTHOR;
            const commenterLogin = context.payload.comment.user.login;
            const isSameUser = prAuthorLogin.toLowerCase() === commenterLogin.toLowerCase();
            const prUrl = process.env.PR_URL;
            const prTitle = process.env.PR_TITLE;
            const additionalInfo = process.env.ADDITIONAL_INFO;

            // ==========================================================
            // Search Slack channel for an existing message about this PR
            // ==========================================================
            let existingSlackTs = '';
            let existingReactions = null;

            try {
              let cursor;
              let found = false;
              // Search up to 5 pages (500 messages) of channel history
              for (let page = 0; page < 5 && !found; page++) {
                const params = { channel: channelId, limit: '100' };
                if (cursor) params.cursor = cursor;
                const history = await slackApi('conversations.history', { params });
                if (!history.ok) {
                  core.warning(`conversations.history failed: ${history.error}`);
                  break;
                }
                for (const msg of (history.messages || [])) {
                  let foundInText = false;

                  // 1. Check fallback text
                  if (msg.text && msg.text.includes(prUrl)) foundInText = true;

                  // 2. Check blocks recursively
                  function blocksContainUrl(blocks) {
                    if (!blocks) return false;
                    for (const b of blocks) {
                      if (typeof b === 'object') {
                        for (const key of Object.keys(b)) {
                          const val = b[key];
                          if (typeof val === 'string') {
                            // Normalize Slack link: "<URL|text>" → "URL"
                            const normalized = val.replace(/<([^>|]+)(\|[^>]+)?>/g, '$1');
                            if (normalized.includes(prUrl)) return true;
                          }
                          if (Array.isArray(val) && blocksContainUrl(val)) return true;
                          if (typeof val === 'object' && blocksContainUrl([val])) return true;
                        }
                      }
                    }
                    return false;
                  }

                  if (!foundInText && blocksContainUrl(msg.blocks)) foundInText = true;

                  if (foundInText) {
                    existingSlackTs = msg.ts;
                    existingReactions = msg.reactions || [];
                    found = true;
                    core.info(`Found existing Slack message for this PR: ts=${msg.ts}`);
                    break;
                  }
                }
                cursor = history.response_metadata?.next_cursor;
                if (!cursor) break;
              }
            } catch (e) {
              core.warning(`Slack channel history search failed: ${e.message}`);
            }

            // ==========================================================
            // EXISTING THREAD: reply instead of creating a new message
            // ==========================================================
            if (existingSlackTs) {
              // Fetch reactions from the existing Slack message
              let eyesMentions = '';
              try {
                const reactionsData = await slackApi('reactions.get', {
                  params: { channel: channelId, timestamp: existingSlackTs },
                });
                if (reactionsData.ok) {
                  const eyesReaction = reactionsData.message?.reactions?.find(r => r.name === 'eyes');
                  if (eyesReaction) {
                    eyesMentions = eyesReaction.users.map(id => `<@${id}>`).join(', ');
                  }
                }
              } catch (e) {
                core.warning(`Failed to fetch reactions: ${e.message}`);
              }

              // Build thread text
              let threadBlocks = [];

              // Main text
              let mainText = 'PR is ready for re-review';
              if (!isSameUser) {
                const mention = await resolveToSlackMention(commenterLogin) || `@${commenterLogin}`;
                mainText += ` (requested by ${mention})`;
              }
              if (eyesMentions) mainText += `\ncc ${eyesMentions}`;

              threadBlocks.push({
                type: 'section',
                text: { type: 'mrkdwn', text: mainText },
              });

              // Additional info block, separated by horizontal line if present
              if (additionalInfo) {
                threadBlocks.push({
                  type: 'divider',
                });
                threadBlocks.push({
                  type: 'section',
                  text: { type: 'mrkdwn', text: additionalInfo },
                });
              }

              const threadData = await slackApi('chat.postMessage', {
                body: { channel: channelId, thread_ts: existingSlackTs, blocks: threadBlocks },
              });
              if (!threadData.ok) {
                core.setFailed(`Thread reply failed: ${threadData.error}`);
                return;
              }
              core.info(`Re-review thread reply posted: ts=${threadData.ts}`);
              core.setOutput('is_new', 'false');
              return;
            }

            // ==========================================================
            // NEW MESSAGE: first notification for this PR
            // ==========================================================
            const authorMention = await resolveToSlackMention(prAuthorLogin) || `@${prAuthorLogin}`;
            const commenterMention = isSameUser
              ? authorMention
              : (await resolveToSlackMention(commenterLogin) || `@${commenterLogin}`);

            const escapedTitle = escapeSlackText(prTitle);
            const requestedBy = isSameUser ? '' : `\n_Requested by ${commenterMention}_`;
            const text = isSameUser
              ? `PR by ${authorMention} is ready for review: ${prUrl}`
              : `PR by ${authorMention} is ready for review: ${prUrl} (requested by ${commenterMention})`;
            const blocks = [
              {
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text: `*PR by ${authorMention} is ready for review:* ${prUrl}`,
                },
              },
            ];
            if (additionalInfo) {
              blocks.push({
                type: 'section',
                text: { type: 'mrkdwn', text: additionalInfo },
              });
            }

            const postData = await slackApi('chat.postMessage', {
              body: { channel: channelId, text, blocks },
            });
            if (!postData.ok) {
              core.setFailed(`chat.postMessage failed: ${postData.error}`);
              return;
            }
            core.info(`Slack message posted: ts=${postData.ts}`);
            core.setOutput('slack_ts', postData.ts);
            core.setOutput('is_new', 'true');

            // Subscribe author to thread
            if (authorMention.startsWith('<@')) {
              try {
                const td = await slackApi('chat.postMessage', {
                  body: {
                    channel: channelId,
                    thread_ts: postData.ts,
                    text: `${authorMention} — you'll be notified of replies to this thread.`,
                  },
                });
                if (!td.ok) core.warning(`Author subscription reply failed: ${td.error}`);
              } catch (e) {
                core.warning(`Author subscription reply failed: ${e.message}`);
              }
            }

      - name: Mark PR with Slack message reference
        if: steps.slack-notify.outputs.is_new == 'true'
        uses: actions/github-script@v7
        env:
          CHANNEL_NAME: ${{ steps.slack-notify.outputs.channel_name }}
          SLACK_TS: ${{ steps.slack-notify.outputs.slack_ts }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const channelName = process.env.CHANNEL_NAME;
            const slackTs = process.env.SLACK_TS;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `<!-- slack-notify-ts:${slackTs} -->\n:white_check_mark: Slack notification sent to *#${channelName}*.`,
            });
