name: PR Ready Notify

# Tracks PR lifecycle events and maintains one Slack message per PR.
# Thread replies notify the team of status changes; the parent message
# text is updated with an emoji prefix showing the current status.
# Reactions on the parent message are also managed (requires reactions:write scope).

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, ready_for_review, converted_to_draft, closed]
  pull_request_review:
    types: [submitted]

# Prevent concurrent runs for the same PR to avoid race conditions
# on the Slack message (e.g. merge + close firing simultaneously).
concurrency:
  group: pr-notify-${{ github.event.pull_request.number || github.event.issue.number }}

jobs:
  notify-slack:
    if: >-
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@pr-ready')) ||
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      # ── Step 1: Extract text that may need summarization ──────
      # Lightweight step that pulls out review body or @pr-ready
      # additional text so it can be summarized before posting.
      # Extract text and decide if LLM summarization is needed.
      # Short text (≤150 chars) is used as-is to skip the slow Claude step.
      - name: Extract text to summarize
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MAX_SHORT = 150;
            const eventName = context.eventName;
            let raw = '';

            if (eventName === 'pull_request_review') {
              if (context.payload.review.user.type === 'Bot') return;
              raw = (context.payload.review.body || '').trim();
            } else if (eventName === 'issue_comment') {
              const commentBody = context.payload.comment.body || '';
              if (!commentBody.toLowerCase().includes('@pr-ready')) return;
              raw = commentBody
                .split('\n')
                .filter(l => !l.trim().toLowerCase().startsWith('@pr-ready'))
                .join('\n').trim();
            }

            if (!raw) return;

            if (raw.length <= MAX_SHORT) {
              // Short enough — use as-is, skip Claude
              core.setOutput('summary', raw);
              core.info(`Short text (${raw.length} chars) — skipping LLM`);
            } else {
              // Long text — needs LLM summarization
              core.setOutput('text', raw);
              core.setOutput('needs_llm', 'true');
              core.info(`Long text (${raw.length} chars) — needs LLM`);
            }

      # ── Summarize with Claude (only for long text) ────────────
      - name: Checkout for Claude Code Action
        if: steps.extract.outputs.needs_llm == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Summarize with Claude
        id: summarize
        if: steps.extract.outputs.needs_llm == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Summarize the following PR review comment in 1-2 concise sentences for a Slack notification. Keep it short and to the point. Do not use markdown formatting. If the text is already short enough (one sentence), just return it as-is. Return ONLY the summary text, nothing else.

            ${{ steps.extract.outputs.text }}

      - name: Parse Claude summary
        id: parse-summary
        if: steps.summarize.outputs.execution_file != ''
        uses: actions/github-script@v7
        env:
          EXECUTION_FILE: ${{ steps.summarize.outputs.execution_file }}
        with:
          script: |
            const fs = require('fs');
            const filePath = process.env.EXECUTION_FILE;
            if (!filePath || !fs.existsSync(filePath)) {
              core.info('No execution file found');
              return;
            }
            try {
              const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              const resultEntry = Array.isArray(data)
                ? data.find(e => e.type === 'result')
                : data;
              if (!resultEntry) return;

              const r = resultEntry.result;
              let text = '';
              if (typeof r === 'string') {
                text = r.trim();
              } else if (Array.isArray(r)) {
                text = r
                  .filter(b => b.type === 'text')
                  .map(b => b.text)
                  .join('\n')
                  .trim();
              }
              if (text) {
                core.setOutput('summary', text);
                core.info(`Extracted summary: ${text.substring(0, 100)}`);
              }
            } catch (e) {
              core.warning(`Failed to parse execution file: ${e.message}`);
            }

      # ── Step 4: Main Slack notification ───────────────────────
      - name: PR lifecycle Slack notification
        id: slack-notify
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          LLM_SUMMARY: ${{ steps.parse-summary.outputs.summary || steps.extract.outputs.summary }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const slackToken = process.env.SLACK_BOT_TOKEN;
            const channelId = process.env.SLACK_CHANNEL_ID;
            const llmSummary = (process.env.LLM_SUMMARY || '').trim();

            // ── Slack API helper ─────────────────────────────────────
            // Wraps fetch with auth header, scope diagnostics on first
            // call, and automatic retry on 429 (rate limit).
            let _scopesLogged = false;

            async function slackApi(method, options = {}) {
              const { params, body } = options;
              const url = new URL(`https://slack.com/api/${method}`);
              if (params) {
                for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
              }
              const fetchOpts = { headers: { Authorization: `Bearer ${slackToken}` } };
              if (body) {
                fetchOpts.method = 'POST';
                fetchOpts.headers['Content-Type'] = 'application/json';
                fetchOpts.body = JSON.stringify(body);
              }

              let res = await fetch(url, fetchOpts);

              // Retry once on rate limit using the Retry-After header
              if (res.status === 429) {
                const retryAfter = parseInt(res.headers.get('Retry-After') || '2', 10);
                core.warning(`Slack rate limited on ${method} — retrying after ${retryAfter}s`);
                await new Promise(r => setTimeout(r, retryAfter * 1000));
                res = await fetch(url, fetchOpts);
              }

              if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);

              // Log OAuth scopes on first successful call to aid debugging
              if (!_scopesLogged) {
                const scopes = res.headers.get('x-oauth-scopes');
                core.info(`Bot OAuth scopes: ${scopes}`);
                if (scopes && !scopes.includes('reactions:write')) {
                  core.warning('reactions:write scope is MISSING — add it in Slack app settings and reinstall the app.');
                }
                _scopesLogged = true;
              }

              return res.json();
            }

            // ── Determine event type & PR info ───────────────────────
            const eventName = context.eventName;
            let pr, action;

            if (eventName === 'issue_comment') {
              const { data } = await github.rest.pulls.get({
                ...context.repo, pull_number: context.issue.number,
              });
              pr = data;
              action = 'pr-ready-comment';
            } else if (eventName === 'pull_request') {
              pr = context.payload.pull_request;
              const ghAction = context.payload.action;
              if (ghAction === 'opened' && !pr.draft)      action = 'opened';
              else if (ghAction === 'reopened' && !pr.draft) action = 'reopened';
              else if (ghAction === 'ready_for_review')      action = 'ready-for-review';
              else if (ghAction === 'converted_to_draft')    action = 'converted-to-draft';
              else if (ghAction === 'closed' && pr.merged)   action = 'merged';
              else if (ghAction === 'closed')                action = 'closed';
              else { core.info(`Skipping: action=${ghAction}, draft=${pr.draft}`); return; }
            } else if (eventName === 'pull_request_review') {
              pr = context.payload.pull_request;

              // Skip reviews submitted by bots (e.g. automated checks)
              if (context.payload.review.user.type === 'Bot') {
                core.info(`Skipping bot review by ${context.payload.review.user.login}`);
                return;
              }

              const state = context.payload.review.state.toLowerCase();

              // Filter out empty review-comment events (inline comments without
              // a formal review body) to avoid flooding the Slack thread.
              if (state === 'commented') {
                const reviewBody = (context.payload.review.body || '').trim();
                if (!reviewBody) {
                  core.info('Skipping review-commented: empty review body (inline comment only)');
                  return;
                }
              }

              if (state === 'approved')               action = 'review-approved';
              else if (state === 'changes_requested') action = 'review-changes-requested';
              else if (state === 'commented')         action = 'review-commented';
              else { core.info(`Skipping review: state=${state}`); return; }
            }

            const prNumber = pr.number;
            const prTitle  = pr.title;
            const prUrl    = pr.html_url;
            const prAuthorLogin = pr.user.login;
            core.info(`Event: ${action}, PR #${prNumber}`);

            // ── @pr-ready: guard against invalid PR states ───────────
            if (action === 'pr-ready-comment') {
              const guards = {
                merged: pr.merged,
                closed: pr.state === 'closed',
                draft:  pr.draft,
              };
              const msgs = {
                merged: '> [!WARNING]\n> This PR has already been merged. No further review is needed.',
                closed: '> [!WARNING]\n> This PR is currently closed. PR review has not been requested.',
                draft:  '> [!WARNING]\n> This PR is currently marked as *Draft*.\n> Convert to ready-for-review first.',
              };
              for (const [key, cond] of Object.entries(guards)) {
                if (cond) {
                  await github.rest.issues.createComment({
                    ...context.repo, issue_number: prNumber, body: msgs[key],
                  });
                  return;
                }
              }
            }

            // ── Fetch channel info & pinned user mapping ─────────────
            const [channelResult, pinsResult] = await Promise.allSettled([
              slackApi('conversations.info', { params: { channel: channelId } }),
              slackApi('pins.list', { params: { channel: channelId } }),
            ]);

            let channelName = channelId;
            if (channelResult.status === 'fulfilled' && channelResult.value.ok) {
              channelName = channelResult.value.channel?.name || channelId;
            }

            // Parse the pinned "github-slack-user-map" message
            const keyToSlackEmail = {};
            if (pinsResult.status === 'fulfilled' && pinsResult.value.ok) {
              const mappingMsg = pinsResult.value.items?.find(
                item => item.message?.text?.includes('github-slack-user-map')
              );
              if (mappingMsg) {
                const lines = mappingMsg.message.text.split('\n');
                const start = lines.findIndex(l => l.trim().toLowerCase().startsWith('github-slack-user-map'));
                if (start !== -1) {
                  for (const raw of lines.slice(start + 1)) {
                    const line = raw.trim();
                    if (!line || line.startsWith('#')) continue;
                    const sep = line.indexOf(': ');
                    if (sep === -1) continue;
                    const key = line.slice(0, sep).trim().toLowerCase();
                    let val = line.slice(sep + 2).trim();
                    const m = val.match(/<mailto:[^|]+\|([^>]+)>/);
                    if (m) val = m[1];
                    if (key && val) keyToSlackEmail[key] = val;
                  }
                }
                core.info(`Loaded ${Object.keys(keyToSlackEmail).length} pinned mappings`);
              }
            }

            // ── GitHub → Slack user resolution ───────────────────────
            const emailCache = new Map();

            async function slackMentionByEmail(email) {
              const lower = email.toLowerCase();
              if (emailCache.has(lower)) return emailCache.get(lower);
              let mention = null;
              try {
                const data = await slackApi('users.lookupByEmail', { params: { email } });
                if (data.ok && data.user) mention = `<@${data.user.id}>`;
              } catch (_) { /* ignore */ }
              emailCache.set(lower, mention);
              return mention;
            }

            async function resolveEmailToSlackMention(email) {
              const mention = await slackMentionByEmail(email);
              if (mention) return mention;
              const mapped = keyToSlackEmail[email.toLowerCase()];
              if (mapped && mapped.toLowerCase() !== email.toLowerCase()) {
                return await slackMentionByEmail(mapped);
              }
              return null;
            }

            // Lazily cached PR commits (used for commit-email resolution)
            let _prCommits = null;
            async function getPrCommits() {
              if (_prCommits !== null) return _prCommits;
              try {
                const { data } = await github.rest.pulls.listCommits({
                  ...context.repo, pull_number: prNumber,
                });
                _prCommits = data;
              } catch (_) { _prCommits = []; }
              return _prCommits;
            }

            // Resolve a GitHub username → Slack mention.
            // Tries: 1) GH profile email  2) PR commit email  3) pinned mapping
            async function resolveToSlackMention(ghUsername) {
              try {
                const { data: ghUser } = await github.rest.users.getByUsername({ username: ghUsername });
                if (ghUser.email) {
                  const mention = await resolveEmailToSlackMention(ghUser.email);
                  if (mention) return mention;
                }
              } catch (_) { /* ignore */ }

              const commits = await getPrCommits();
              const hit = commits.findLast(c => c.author?.login?.toLowerCase() === ghUsername.toLowerCase());
              const email = hit?.commit?.author?.email;
              if (email && !email.endsWith('@users.noreply.github.com')) {
                const mention = await resolveEmailToSlackMention(email);
                if (mention) return mention;
              }

              const mapped = keyToSlackEmail[ghUsername.toLowerCase()];
              if (mapped) return await slackMentionByEmail(mapped);

              core.warning(`Could not resolve ${ghUsername} to Slack user`);
              return null;
            }

            // ── Resolve assigned reviewers ────────────────────────────
            // Returns an array of Slack mentions for all current PR reviewers
            // (requested_reviewers + those who submitted reviews), excluding the author.
            async function getReviewerMentions() {
              const reviewerLogins = new Set();
              for (const r of (pr.requested_reviewers || [])) {
                if (r.login.toLowerCase() !== prAuthorLogin.toLowerCase()) reviewerLogins.add(r.login);
              }
              try {
                const reviews = await github.paginate(github.rest.pulls.listReviews, {
                  ...context.repo, pull_number: prNumber, per_page: 100,
                });
                for (const r of reviews) {
                  if (r.user.login.toLowerCase() !== prAuthorLogin.toLowerCase()) reviewerLogins.add(r.user.login);
                }
              } catch (_) { /* ignore */ }

              const mentions = [];
              for (const login of reviewerLogins) {
                mentions.push(await resolveToSlackMention(login) || `@${login}`);
              }
              return mentions;
            }

            // ── Find existing Slack message for this PR ──────────────
            // Fast path: check PR comments for cached ts from a previous
            // notification (<!-- slack-notify-ts:... -->). Falls back to
            // channel history search (up to 500 messages) if not found.
            let existingSlackTs = '';

            try {
              const { data: comments } = await github.rest.issues.listComments({
                ...context.repo, issue_number: prNumber, per_page: 100,
              });
              for (const c of comments) {
                const m = c.body?.match(/<!-- slack-notify-ts:(\S+) -->/);
                if (m) {
                  existingSlackTs = m[1];
                  core.info(`Found cached Slack ts from PR comment: ${existingSlackTs}`);
                  break;
                }
              }
            } catch (e) {
              core.warning(`PR comment cache lookup failed: ${e.message}`);
            }

            // Slow path: search channel history if no cached ts found
            if (!existingSlackTs) {
              try {
                let cursor, found = false;
                for (let page = 0; page < 5 && !found; page++) {
                  const params = { channel: channelId, limit: '100' };
                  if (cursor) params.cursor = cursor;
                  const history = await slackApi('conversations.history', { params });
                  if (!history.ok) break;

                  for (const msg of (history.messages || [])) {
                    const inText = msg.text?.includes(prUrl);
                    const inBlocks = (function check(nodes) {
                      if (!nodes) return false;
                      for (const n of nodes) {
                        if (typeof n !== 'object') continue;
                        for (const v of Object.values(n)) {
                          if (typeof v === 'string') {
                            if (v.replace(/<([^>|]+)(\|[^>]+)?>/g, '$1').includes(prUrl)) return true;
                          }
                          if (Array.isArray(v) && check(v)) return true;
                          if (typeof v === 'object' && v !== null && check([v])) return true;
                        }
                      }
                      return false;
                    })(msg.blocks);

                    if (inText || inBlocks) {
                      existingSlackTs = msg.ts;
                      found = true;
                      core.info(`Found existing Slack message via history: ts=${msg.ts}`);
                      break;
                    }
                  }
                  cursor = history.response_metadata?.next_cursor;
                  if (!cursor) break;
                }
              } catch (e) {
                core.warning(`Channel history search failed: ${e.message}`);
              }
            }

            // ── Status configuration ─────────────────────────────────
            // Each status maps to an emoji prefix (shown in message text)
            // and a reaction name (added to the parent message).
            // Only one status reaction is present at a time.
            //
            // Status lifecycle:
            //   (no emoji)         → Waiting for reviews (initial)
            //   :bell:             → Ready for re-review (@pr-ready)
            //   :pencil2:          → Converted to draft
            //   :white_check_mark: → Approved
            //   :repeat:           → Changes requested
            //   :speech_balloon:   → Commented
            //   :tada:             → Merged
            //   :no_entry:         → Closed
            const ALL_STATUS_REACTIONS = [
              'bell', 'white_check_mark', 'repeat',
              'speech_balloon', 'pencil2', 'tada', 'no_entry',
            ];

            const STATUS = {
              'ready':                    { emoji: ':bell:',              label: 'Ready for re-review' },
              'converted-to-draft':       { emoji: ':pencil2:',          label: 'Draft' },
              'review-approved':          { emoji: ':white_check_mark:', label: 'Approved' },
              'review-commented':         { emoji: ':speech_balloon:',   label: 'Commented' },
              'review-changes-requested': { emoji: ':repeat:',           label: 'Changes requested' },
              'merged':                   { emoji: ':tada:',             label: 'Merged' },
              'closed':                   { emoji: ':no_entry:',         label: 'Closed' },
            };

            // ── Helper: append summary divider to message text ───────
            function appendSummary(text) {
              if (llmSummary) return `${text}\n\n───\n${llmSummary}`;
              return text;
            }

            // ── Build parent message text ─────────────────────────────
            // Format:
            //   PR #1234 – Title
            //   Author: @mention
            //   Link: <url>
            //   Assigned reviewers: @bob @carol   (only if reviewers exist)
            function buildParentText(statusKey, authorMention, reviewerMentions) {
              const cfg = statusKey ? STATUS[statusKey] : null;
              const prefix = cfg ? `${cfg.emoji} ` : '';
              const statusSuffix = cfg ? ` [${cfg.label}]` : '';

              let text = `${prefix}*PR #${prNumber} – ${prTitle}${statusSuffix}*\n`;
              text += `*Author:* ${authorMention}\n`;
              text += `*Link:* ${prUrl}`;
              if (reviewerMentions && reviewerMentions.length) {
                text += `\n*Assigned reviewers:* ${reviewerMentions.join(', ')}`;
              }
              return text;
            }

            // ── Update parent message text & reaction ────────────────
            async function updateParentMessage(ts, statusKey, authorMention, reviewerMentions) {
              const cfg = STATUS[statusKey];
              if (!cfg) return;

              const reaction = cfg.emoji.replace(/:/g, '');
              const text = buildParentText(statusKey, authorMention, reviewerMentions);

              // 1. Update message text with new status and info
              try {
                const r = await slackApi('chat.update', {
                  body: {
                    channel: channelId, ts, text,
                    unfurl_links: false,
                    blocks: [{ type: 'section', text: { type: 'mrkdwn', text } }],
                  },
                });
                if (!r.ok) core.warning(`chat.update: ${r.error}`);
              } catch (e) {
                core.warning(`chat.update threw: ${e.message}`);
              }

              // 2. Add the current status reaction
              try {
                const r = await slackApi('reactions.add', {
                  body: { channel: channelId, timestamp: ts, name: reaction },
                });
                if (!r.ok && r.error !== 'already_reacted') core.warning(`reactions.add(${reaction}): ${r.error}`);
              } catch (e) {
                core.warning(`reactions.add(${reaction}) threw: ${e.message}`);
              }

              // 3. Remove all other bot-managed status reactions (in parallel)
              const removals = ALL_STATUS_REACTIONS
                .filter(name => name !== reaction)
                .map(name =>
                  slackApi('reactions.remove', {
                    body: { channel: channelId, timestamp: ts, name },
                  }).then(r => {
                    if (!r.ok && r.error !== 'no_reaction') core.warning(`reactions.remove(${name}): ${r.error}`);
                  }).catch(() => { /* not present — ignore */ })
                );
              await Promise.allSettled(removals);
            }

            // ── Post a thread reply ──────────────────────────────────
            async function postThreadReply(ts, text) {
              const r = await slackApi('chat.postMessage', {
                body: {
                  channel: channelId, thread_ts: ts, text,
                  unfurl_links: false,
                  blocks: [{ type: 'section', text: { type: 'mrkdwn', text } }],
                },
              });
              if (!r.ok) core.warning(`Thread reply failed: ${r.error}`);
              return r.ok ? r.ts : null;
            }

            // ── Create initial parent message ────────────────────────
            // No status emoji — "no emoji" = waiting for reviews.
            async function createParentMessage(authorMention, reviewerMentions) {
              const text = buildParentText(null, authorMention, reviewerMentions);
              const r = await slackApi('chat.postMessage', {
                body: {
                  channel: channelId,
                  text,
                  unfurl_links: false,
                  blocks: [{ type: 'section', text: { type: 'mrkdwn', text } }],
                },
              });
              if (!r.ok) { core.setFailed(`chat.postMessage: ${r.error}`); return null; }
              core.info(`New Slack message: ts=${r.ts}`);
              return r.ts;
            }

            // ── Subscribe PR author to thread ────────────────────────
            async function subscribeAuthor(ts, authorMention) {
              if (!authorMention.startsWith('<@')) return;
              try {
                await slackApi('chat.postMessage', {
                  body: {
                    channel: channelId, thread_ts: ts,
                    text: `${authorMention} — you'll be notified of replies to this thread.`,
                  },
                });
              } catch (e) {
                core.warning(`Author subscription failed: ${e.message}`);
              }
            }

            // ══════════════════════════════════════════════════════════
            // Event handlers
            // ══════════════════════════════════════════════════════════
            const authorMention = await resolveToSlackMention(prAuthorLogin) || `@${prAuthorLogin}`;

            // ── @pr-ready comment ────────────────────────────────────
            // Posts a re-review notice and mentions all PR reviewers.
            if (action === 'pr-ready-comment') {
              // If no Slack thread exists yet, create the parent message first
              if (!existingSlackTs) {
                const reviewerMentions = await getReviewerMentions();
                const ts = await createParentMessage(authorMention, reviewerMentions);
                if (!ts) return;
                existingSlackTs = ts;
                await subscribeAuthor(ts, authorMention);
              }

              const commenterLogin = context.payload.comment.user.login;
              const isSameUser = prAuthorLogin.toLowerCase() === commenterLogin.toLowerCase();

              const reviewerMentions = await getReviewerMentions();

              let text = ':bell: PR is ready for re-review';
              if (!isSameUser) {
                const who = await resolveToSlackMention(commenterLogin) || `@${commenterLogin}`;
                text += ` (requested by ${who})`;
              }
              if (reviewerMentions.length) text += `\ncc ${reviewerMentions.join(', ')}`;

              // Append LLM summary of any additional text from the @pr-ready comment
              text = appendSummary(text);

              await postThreadReply(existingSlackTs, text);
              await updateParentMessage(existingSlackTs, 'ready', authorMention, reviewerMentions);
              return;
            }

            // ── PR opened, reopened, or marked ready for review ───────
            if (action === 'opened' || action === 'reopened' || action === 'ready-for-review') {
              // Resolve reviewers for the parent message (may be empty initially)
              const reviewerMentions = await getReviewerMentions();

              if (existingSlackTs) {
                const verb = action === 'reopened' ? 'has been reopened and is'
                           : action === 'opened' ? 'opened and is'
                           : 'is now';
                await postThreadReply(existingSlackTs, `PR ${verb} ready for review`);
                // Update parent to clear any previous status and refresh reviewer list
                await updateParentMessage(existingSlackTs, 'ready', authorMention, reviewerMentions);
              } else {
                const ts = await createParentMessage(authorMention, reviewerMentions);
                if (!ts) return;
                await subscribeAuthor(ts, authorMention);
                core.setOutput('is_new', 'true');
                core.setOutput('slack_ts', ts);
                core.setOutput('channel_name', channelName);
              }
              return;
            }

            // ── Converted to draft ───────────────────────────────────
            if (action === 'converted-to-draft') {
              if (!existingSlackTs) return;
              const reviewerMentions = await getReviewerMentions();
              await postThreadReply(existingSlackTs, ':pencil2: PR has been converted back to draft');
              await updateParentMessage(existingSlackTs, 'converted-to-draft', authorMention, reviewerMentions);
              return;
            }

            // ── Review submitted ─────────────────────────────────────
            if (action.startsWith('review-')) {
              if (!existingSlackTs) return;
              const reviewer = context.payload.review.user.login;
              const mention = await resolveToSlackMention(reviewer) || `@${reviewer}`;
              const msgs = {
                'review-approved':          `:white_check_mark: ${mention} reviewed this PR — *approved*`,
                'review-changes-requested': `:repeat: ${mention} reviewed this PR — *requested changes*`,
                'review-commented':         `:speech_balloon: ${mention} reviewed this PR — *commented*`,
              };

              // Append LLM summary of the review body if present
              const text = appendSummary(msgs[action]);

              await postThreadReply(existingSlackTs, text);
              // Re-fetch reviewers so the parent message stays up to date
              // (a new reviewer may have just submitted their first review)
              const reviewerMentions = await getReviewerMentions();
              await updateParentMessage(existingSlackTs, action, authorMention, reviewerMentions);
              return;
            }

            // ── Merged ───────────────────────────────────────────────
            if (action === 'merged') {
              if (!existingSlackTs) return;
              const reviewerMentions = await getReviewerMentions();
              await postThreadReply(existingSlackTs, ':tada: PR has been merged');
              await updateParentMessage(existingSlackTs, 'merged', authorMention, reviewerMentions);
              return;
            }

            // ── Closed (not merged) ──────────────────────────────────
            if (action === 'closed') {
              if (!existingSlackTs) return;
              const reviewerMentions = await getReviewerMentions();
              await postThreadReply(existingSlackTs, ':no_entry: PR has been closed');
              await updateParentMessage(existingSlackTs, 'closed', authorMention, reviewerMentions);
              return;
            }

      # Post a confirmation comment on the PR linking to the Slack thread
      - name: Comment on PR with Slack reference
        if: steps.slack-notify.outputs.is_new == 'true'
        uses: actions/github-script@v7
        env:
          CHANNEL_NAME: ${{ steps.slack-notify.outputs.channel_name }}
          SLACK_TS: ${{ steps.slack-notify.outputs.slack_ts }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const channelName = process.env.CHANNEL_NAME;
            const slackTs = process.env.SLACK_TS;
            const prNumber = context.issue?.number || context.payload.pull_request?.number;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNumber,
              body: `<!-- slack-notify-ts:${slackTs} -->\n:white_check_mark: Slack notification sent to *#${channelName}*.`,
            });
