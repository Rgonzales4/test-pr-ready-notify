name: PR Ready Notify

# Note: issue_comment is the only GitHub event that fires for PR comments.
# There is no PR-only comment event. The job-level `if` below ensures this
# workflow is completely skipped for plain issue comments.
on:
  issue_comment:
    types: [created]

jobs:
  notify-slack:
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@pr-ready')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Verify this is a pull request
        run: |
          if [ -z "${{ github.event.issue.pull_request.url }}" ]; then
            echo "::notice::Not a pull request comment — skipping."
            exit 1
          fi

      - name: Check if already notified and get PR info
        id: pr-info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check for existing bot notification marker
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const alreadyNotified = comments.some(
              (c) =>
                c.user.type === 'Bot' &&
                c.body.includes('<!-- pr-ready-notified -->')
            );

            if (alreadyNotified) {
              core.setOutput('skip', 'true');
              return;
            }

            // Fetch PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            core.setOutput('skip', 'false');
            core.setOutput('is_draft', pr.draft ? 'true' : 'false');
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_author', pr.user.login);

            // Extract additional info: strip the @pr-ready line and trim blank lines
            const body = context.payload.comment.body;
            const additionalInfo = body
              .split('\n')
              .filter((line) => !line.trim().startsWith('@pr-ready'))
              .join('\n')
              .trim();

            core.setOutput('additional_info', additionalInfo);

      - name: Comment on draft PR
        if: |
          steps.pr-info.outputs.skip == 'false' &&
          steps.pr-info.outputs.is_draft == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `> [!WARNING]\n> Make sure PR is not in Draft before requesting a review.`,
            });

      - name: Notify Slack with auto-mapped mentions
        if: |
          steps.pr-info.outputs.skip == 'false' &&
          steps.pr-info.outputs.is_draft == 'false'
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GITHUB_SLACK_OVERRIDES: ${{ secrets.GITHUB_SLACK_OVERRIDES }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const slackToken = process.env.SLACK_BOT_TOKEN;
            const channelId = process.env.SLACK_CHANNEL_ID;

            // Parse optional manual overrides (JSON map: {"github-user": "USLACKID"})
            let overrides = {};
            try {
              const raw = process.env.GITHUB_SLACK_OVERRIDES;
              if (raw) overrides = JSON.parse(raw);
            } catch (e) {
              core.warning(`Failed to parse GITHUB_SLACK_OVERRIDES: ${e.message}`);
            }

            // --- Helper: resolve a GitHub username to a Slack user ID ---
            async function resolveToSlackId(githubUsername) {
              // Check manual overrides first
              if (overrides[githubUsername]) {
                core.info(`Using override for ${githubUsername}: ${overrides[githubUsername]}`);
                return overrides[githubUsername];
              }

              // Step 1: Get email from GitHub profile
              let email = null;
              try {
                const { data: ghUser } = await github.rest.users.getByUsername({
                  username: githubUsername,
                });
                if (ghUser.email) email = ghUser.email;
              } catch (e) {
                core.warning(`Failed to fetch GitHub user ${githubUsername}: ${e.message}`);
              }

              // Step 2: Fallback — extract email from PR commits
              if (!email) {
                try {
                  const { data: commits } = await github.rest.pulls.listCommits({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                  });
                  const match = commits.find(
                    (c) => c.author && c.author.login === githubUsername
                  );
                  if (match && match.commit.author && match.commit.author.email) {
                    email = match.commit.author.email;
                  }
                } catch (e) {
                  core.warning(`Failed to fetch PR commits: ${e.message}`);
                }
              }

              // Skip noreply emails — they won't match Slack
              if (!email || email.endsWith('@users.noreply.github.com')) {
                core.info(`No usable email found for ${githubUsername}`);
                return null;
              }

              // Step 3: Look up Slack user by email
              try {
                const res = await fetch(
                  `https://slack.com/api/users.lookupByEmail?email=${encodeURIComponent(email)}`,
                  { headers: { Authorization: `Bearer ${slackToken}` } }
                );
                const data = await res.json();
                if (data.ok) {
                  core.info(`Resolved ${githubUsername} (${email}) → Slack ${data.user.id}`);
                  return data.user.id;
                }
                core.info(`Slack lookup failed for ${email}: ${data.error}`);
              } catch (e) {
                core.warning(`Slack API error for ${email}: ${e.message}`);
              }

              return null;
            }

            // --- Resolve PR author and commenter in parallel ---
            const prAuthor = '${{ steps.pr-info.outputs.pr_author }}';
            const commenter = context.payload.comment.user.login;

            let authorSlackId, commenterSlackId;
            if (prAuthor === commenter) {
              authorSlackId = await resolveToSlackId(prAuthor);
              commenterSlackId = authorSlackId;
            } else {
              [authorSlackId, commenterSlackId] = await Promise.all([
                resolveToSlackId(prAuthor),
                resolveToSlackId(commenter),
              ]);
            }

            // --- Build message ---
            const prUrl = '${{ steps.pr-info.outputs.pr_url }}';
            const prTitle = `${{ steps.pr-info.outputs.pr_title }}`;
            const additionalInfo = `${{ steps.pr-info.outputs.additional_info }}`;

            const authorMention = authorSlackId ? `<@${authorSlackId}>` : `@${prAuthor}`;
            const commenterMention = commenterSlackId ? `<@${commenterSlackId}>` : `@${commenter}`;

            let text = `PR by ${authorMention} is ready for review: ${prUrl} (requested by ${commenterMention})`;
            if (additionalInfo) text += `\n\n${additionalInfo}`;

            const blocks = [
              {
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text: `*PR by ${authorMention} is ready for review:* <${prUrl}|${prTitle}>\n_Requested by ${commenterMention}_`,
                },
              },
            ];

            if (additionalInfo) {
              blocks.push({
                type: 'section',
                text: { type: 'mrkdwn', text: additionalInfo },
              });
            }

            // --- Post to Slack via chat.postMessage ---
            const postRes = await fetch('https://slack.com/api/chat.postMessage', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${slackToken}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ channel: channelId, text, blocks }),
            });
            const postData = await postRes.json();

            if (!postData.ok) {
              core.setFailed(`Slack chat.postMessage failed: ${postData.error}`);
              return;
            }

            core.info(`Slack message posted: ts=${postData.ts}`);

            // --- Post threaded reply to auto-subscribe PR author ---
            if (authorSlackId) {
              const threadRes = await fetch('https://slack.com/api/chat.postMessage', {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${slackToken}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  channel: channelId,
                  thread_ts: postData.ts,
                  text: `<@${authorSlackId}> — you'll be notified of replies to this thread.`,
                }),
              });
              const threadData = await threadRes.json();
              if (!threadData.ok) {
                core.warning(`Threaded reply failed: ${threadData.error}`);
              } else {
                core.info('Threaded reply posted — author auto-subscribed.');
              }
            } else {
              core.info('Skipping threaded reply — author Slack ID not resolved.');
            }

      - name: Mark PR as notified
        if: |
          steps.pr-info.outputs.skip == 'false' &&
          steps.pr-info.outputs.is_draft == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `<!-- pr-ready-notified -->\n:white_check_mark: Slack notification sent to *#platform-pr-notify*.`,
            });
