name: PR Ready Notify

# Note: issue_comment is the only GitHub event that fires for PR comments.
# There is no PR-only comment event. The job-level `if` below ensures this
# workflow is completely skipped for plain issue comments.
on:
  issue_comment:
    types: [created]

jobs:
  notify-slack:
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@pr-ready')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Verify this is a pull request
        run: |
          if [ -z "${{ github.event.issue.pull_request.url }}" ]; then
            echo "::notice::Not a pull request comment — skipping."
            exit 1
          fi

      - name: Check if already notified and get PR info
        id: pr-info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check for existing bot notification marker
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const alreadyNotified = comments.some(
              (c) =>
                c.user.type === 'Bot' &&
                c.body.includes('<!-- pr-ready-notified -->')
            );

            if (alreadyNotified) {
              core.setOutput('skip', 'true');
              return;
            }

            // Fetch PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            core.setOutput('skip', 'false');
            core.setOutput('is_draft', pr.draft ? 'true' : 'false');
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_author', pr.user.login);

            // Extract additional info: strip the @pr-ready line and trim blank lines
            const body = context.payload.comment.body;
            const additionalInfo = body
              .split('\n')
              .filter((line) => !line.trim().startsWith('@pr-ready'))
              .join('\n')
              .trim();

            core.setOutput('additional_info', additionalInfo);

      - name: Comment on draft PR
        if: |
          steps.pr-info.outputs.skip == 'false' &&
          steps.pr-info.outputs.is_draft == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `> [!WARNING]\n> Make sure PR is not in Draft before requesting a review.`,
            });

      - name: Notify Slack with pinned @mention mapping
        id: slack-notify
        if: |
          steps.pr-info.outputs.skip == 'false' &&
          steps.pr-info.outputs.is_draft == 'false'
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const slackToken = process.env.SLACK_BOT_TOKEN;
            const channelId = process.env.SLACK_CHANNEL_ID;

            // --- Fetch pinned message mapping GitHub emails → Slack @mentions ---
            let overrides = {};
            try {
              const pinRes = await fetch(
                `https://slack.com/api/pins.list?channel=${channelId}`,
                { headers: { Authorization: `Bearer ${slackToken}` } }
              );

              const pinData = await pinRes.json();
              if (pinData.ok) {
                const mappingMsg = pinData.items.find(
                  (item) =>
                    item.message &&
                    item.message.text &&
                    item.message.text.includes('github-slack-map')
                );

                if (mappingMsg) {
                  const lines = mappingMsg.message.text
                    .split('\n')
                    .map(l => l.trim())
                    .filter(l => l && !l.toLowerCase().startsWith('github-slack-map'));

                  for (const line of lines) {
                    const [email, mention] = line.split(':').map(s => s.trim());
                    if (email && mention) {
                      overrides[email] = mention;
                    }
                  }
                  core.info(`Loaded ${Object.keys(overrides).length} GitHub email → Slack @mention mappings`);
                } else {
                  core.info('No github-slack-map pinned message found.');
                }
              } else {
                core.warning(`Failed to fetch pinned messages: ${pinData.error}`);
              }
            } catch (e) {
              core.warning(`Failed to load GitHub→Slack mapping: ${e.message}`);
            }

            // --- Helper: resolve email to Slack mention ---
            async function resolveToSlackMention(email) {
              return overrides[email] || null;
            }

            // --- Get PR author & commenter emails directly from GitHub ---
            const prAuthorLogin = '${{ steps.pr-info.outputs.pr_author }}';
            const commenterLogin = context.payload.comment.user.login;

            let prAuthorEmail = null;
            try {
              const { data: ghUser } = await github.rest.users.getByUsername({ username: prAuthorLogin });
              prAuthorEmail = ghUser.email || null;
            } catch (e) {
              core.warning(`Failed to fetch GitHub user ${prAuthorLogin}: ${e.message}`);
            }

            let commenterEmail = null;
            try {
              const { data: ghCommenter } = await github.rest.users.getByUsername({ username: commenterLogin });
              commenterEmail = ghCommenter.email || null;
            } catch (e) {
              core.warning(`Failed to fetch GitHub user ${commenterLogin}: ${e.message}`);
            }

            const authorMention = await resolveToSlackMention(prAuthorEmail) || `@${prAuthorLogin}`;
            const commenterMention = await resolveToSlackMention(commenterEmail) || `@${commenterLogin}`;

            // --- Build Slack message ---
            const prUrl = '${{ steps.pr-info.outputs.pr_url }}';
            const prTitle = `${{ steps.pr-info.outputs.pr_title }}`;
            const additionalInfo = `${{ steps.pr-info.outputs.additional_info }}`;

            let text = `PR by ${authorMention} is ready for review: ${prUrl} (requested by ${commenterMention})`;
            const blocks = [
              {
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text: `*PR by ${authorMention} is ready for review:* <${prUrl}|${prTitle}>\n_Requested by ${commenterMention}_`
                }
              }
            ];

            if (additionalInfo) {
              blocks.push({
                type: 'section',
                text: { type: 'mrkdwn', text: additionalInfo }
              });
            }

            // --- Post to Slack via chat.postMessage ---
            const postRes = await fetch('https://slack.com/api/chat.postMessage', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${slackToken}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ channel: channelId, text, blocks }),
            });
            const postData = await postRes.json();

            if (!postData.ok) {
              core.setFailed(`Slack chat.postMessage failed: ${postData.error}`);
              return;
            }

            core.info(`Slack message posted: ts=${postData.ts}`);

            // --- Resolve channel name from ID ---
            let channelName = channelId;
            try {
              const infoRes = await fetch(
                `https://slack.com/api/conversations.info?channel=${encodeURIComponent(channelId)}`,
                { headers: { Authorization: `Bearer ${slackToken}` } }
              );
              const infoData = await infoRes.json();
              if (infoData.ok) {
                channelName = infoData.channel.name;
              } else {
                core.warning(`conversations.info failed: ${infoData.error}`);
              }
            } catch (e) {
              core.warning(`Failed to resolve channel name: ${e.message}`);
            }
            core.setOutput('channel_name', channelName);

            // --- Post threaded reply to auto-subscribe PR author ---
            if (authorMention) {
              const threadRes = await fetch('https://slack.com/api/chat.postMessage', {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${slackToken}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  channel: channelId,
                  thread_ts: postData.ts,
                  text: `${authorMention} — you'll be notified of replies to this thread.`
                })
              });
              const threadData = await threadRes.json();
              if (!threadData.ok) {
                core.warning(`Threaded reply failed: ${threadData.error}`);
              } else {
                core.info('Threaded reply posted — author auto-subscribed.');
              }
            } else {
              core.info('Skipping threaded reply — author Slack mention not resolved.');
            }

      - name: Mark PR as notified
        if: |
          steps.pr-info.outputs.skip == 'false' &&
          steps.pr-info.outputs.is_draft == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `<!-- pr-ready-notified -->\n:white_check_mark: Slack notification sent to *#${{ steps.slack-notify.outputs.channel_name }}*.`,
            });
